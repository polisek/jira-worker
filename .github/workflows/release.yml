name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      skipped: ${{ steps.tag.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Automatický tag z commit message
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

  build-windows:
    needs: tag
    if: needs.tag.outputs.skipped != 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Nastav verzi z tagu
        run: npm version ${{ needs.tag.outputs.new_tag }} --no-git-tag-version
      - run: npm run build && npx electron-builder --win --publish=always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: tag
    if: needs.tag.outputs.skipped != 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Instalace závislostí
        run: npm ci
      - name: Nastav verzi z tagu
        run: npm version ${{ needs.tag.outputs.new_tag }} --no-git-tag-version
      - name: Build .app bundle (arm64)
        run: npm run build && npx electron-builder --mac --dir --arch arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Build .app bundle (x64)
        run: npx electron-builder --mac --dir --arch x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Vytvoř DMG (arm64)
        uses: L-Super/create-dmg-actions@v1
        with:
          dmg_name: 'Jira-Worker-${{ needs.tag.outputs.new_tag }}-arm64'
          src_dir: 'dist/mac-arm64/Jira Worker.app'
      - name: Vytvoř DMG (x64)
        uses: L-Super/create-dmg-actions@v1
        with:
          dmg_name: 'Jira-Worker-${{ needs.tag.outputs.new_tag }}-x64'
          src_dir: 'dist/mac-x64/Jira Worker.app'
      - name: Nahraj DMG do release
        run: |
          gh release upload ${{ needs.tag.outputs.new_tag }} \
            "Jira-Worker-${{ needs.tag.outputs.new_tag }}-arm64.dmg" \
            "Jira-Worker-${{ needs.tag.outputs.new_tag }}-x64.dmg" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
